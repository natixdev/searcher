volumes:
  pg_searcer:

services:

  postgres:
    image: postgres:17.1-alpine3.20
    container_name: searcher-postgres
    env_file: .env
    volumes:
      - pg_searcer:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  elasticsearch:
    image: elasticsearch:9.1.0
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
    ports:
      - '9200:9200'

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '8000:8000'
    env_file:
      - .env
