indent-width = 4
line-length = 79
required-version = ">=0.11.11"
target-version = "py312"
preview = true
exclude = [
    ".eggs",
    ".git",
    ".mypy_cache",
    ".tox",
    ".venv",
    "venv",
    "build",
    "dist",
    "manage.py",
    "**/migrations/*",
    "*/tests/*",
    "*/alembic/*",
    "*/scripts/*",
]

[format]
docstring-code-format = true
docstring-code-line-length = 60
line-ending = "lf"
quote-style = "single"

[lint]
ignore = ["E265", "F811", "D100", "D105", "D104", "D106", "D203", "D211", "D213", "N818", "W505", "ANN401"]
select = ["E3", "E5", "E4", "E7", "E9", "W", "C90", "I", "N", "D", "F", "ANN", "ASYNC", "A", "COM", "RET", "Q"]

[lint.extend-per-file-ignores]
"__init__.py" = ["E402", "E401"]
"manage.py" = ["ANN201"]

[lint.flake8-annotations]
allow-star-arg-any = true

[lint.flake8-quotes]
inline-quotes = "single"

[lint.isort]
case-sensitive = true

[lint.mccabe]
max-complexity = 10

[lint.pycodestyle]
max-doc-length = 79
max-line-length = 79
